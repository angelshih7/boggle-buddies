services:
  db:
    image: mysql:8.0
    container_name: boggle-db
    environment:
      MYSQL_DATABASE: boggle
      MYSQL_USER: boggle
      MYSQL_PASSWORD: boggle
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
      - ../BoggleSpringBoot/src/main/resources/db/BoggleDB.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  app:
    build:
      context: ..               
      dockerfile: Docker/Dockerfile
    container_name: boggle-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/boggle?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: boggle
      SPRING_DATASOURCE_PASSWORD: boggle
    ports:
      - "8080:8080"

volumes:
  db_data: