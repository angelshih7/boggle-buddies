spring.application.name=Boggle
spring.jpa.hibernate.ddl-auto=update

# Local dev — connects to the MySQL container started by Docker/docker-compose.yml
# These are overridden by environment variables when running inside Docker (docker-compose app service).
spring.datasource.url=jdbc:mysql://localhost:3306/boggle?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=boggle
spring.datasource.password=boggle
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.error.include-message=always
